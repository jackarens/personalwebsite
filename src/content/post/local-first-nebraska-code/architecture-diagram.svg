<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 840" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <!-- self-contained dark panel: diagram reads the same in light or dark decks -->
  <rect x="0" y="0" width="1280" height="840" rx="18" fill="#1b1f27" stroke="#333a45" stroke-width="2"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b93a1"/>
    </marker>
    <marker id="arrowg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4caf50"/>
    </marker>
  </defs>

  <style>
    .node  { fill:#2c313b; stroke-width:2; }
    .ntxt  { font-size:21px; font-weight:600; text-anchor:middle; }
    .grp   { fill:none; stroke-width:2; stroke-dasharray:6 5; opacity:0.55; }
    .gtxt  { font-size:20px; font-weight:700; }
    .edge  { fill:none; stroke:#8b93a1; stroke-width:2.5; }
    .edgeg { fill:none; stroke:#4caf50; stroke-width:2.5; }
    .etxt  { fill:#b9c0ca; font-size:16px; }
    .etxtc { fill:#b9c0ca; font-size:16px; text-anchor:middle; }
    .num   { fill:#4caf50; font-weight:700; }
    .numn  { fill:#8b93a1; font-weight:700; }
  </style>

  <!-- ================= CONTAINERS ================= -->
  <rect class="grp" x="40" y="46" width="850" height="380" rx="14" stroke="#4caf50"/>
  <text class="gtxt" x="60" y="78" fill="#4caf50">Backend Infrastructure</text>

  <rect class="grp" x="40" y="486" width="1200" height="320" rx="14" stroke="#6f9fd8"/>
  <text class="gtxt" x="60" y="518" fill="#6f9fd8">Client Environment</text>

  <!-- ================= EDGES ================= -->
  <!-- 1. Push -> Transaction -->
  <path class="edgeg" marker-end="url(#arrowg)" d="M240,190 C300,208 322,216 348,224"/>
  <text class="etxt" x="322" y="206" text-anchor="end"><tspan class="num">1.</tspan> Send Mutations</text>

  <!-- Direct write: External -> Transaction -->
  <path class="edge" marker-end="url(#arrow)" d="M1000,150 L720,150 L664,207"/>
  <text class="etxtc" x="835" y="140">Direct Write (via Tx Layer)</text>

  <!-- 2 / 5a. Transaction -> Primary DB -->
  <path class="edgeg" marker-end="url(#arrowg)" d="M672,232 C860,250 980,256 1035,272"/>
  <text class="etxt" x="735" y="300"><tspan class="num">2.</tspan> Atomic Write + Version</text>
  <text class="etxt" x="735" y="324"><tspan class="num">5a.</tspan> Query Diff</text>

  <!-- 3. Primary DB -> Firestore -->
  <path class="edge" marker-end="url(#arrow)" d="M1120,400 L1120,560"/>
  <text class="etxt" x="1108" y="470" text-anchor="end">3. Real-time trigger</text>

  <!-- 4. Firestore -> Replicache -->
  <path class="edge" marker-end="url(#arrow)" d="M980,615 L740,615 L700,660"/>
  <text class="etxtc" x="856" y="600"><tspan class="numn">4.</tspan> Signals Pull</text>

  <!-- 5. Pull -> Transaction (up, left) -->
  <path class="edgeg" marker-end="url(#arrowg)" d="M455,330 L455,268"/>
  <text class="etxt" x="200" y="303"><tspan class="num">5.</tspan> Request Diff</text>

  <!-- 6. Transaction -> Pull (down, right) -->
  <path class="edgeg" marker-end="url(#arrowg)" d="M545,268 L545,330"/>
  <text class="etxt" x="562" y="303"><tspan class="num">6.</tspan> Return Patch</text>

  <!-- Final: Pull -> Replicache -->
  <path class="edge" marker-end="url(#arrow)" d="M500,398 C520,500 540,560 560,632"/>
  <text class="etxt" x="452" y="470">Final: Merge Patch</text>

  <!-- Background sync: Replicache -> Push (far left) -->
  <path class="edge" marker-end="url(#arrow)" d="M440,672 L150,672 L150,175 L202,160"/>
  <text class="etxt" x="132" y="400" transform="rotate(-90 132 400)" text-anchor="middle">Background Sync</text>

  <!-- Optimistic: UI -> Replicache -->
  <path class="edge" marker-end="url(#arrow)" d="M300,620 C360,650 390,660 435,672"/>
  <text class="etxt" x="308" y="654">Optimistic UI</text>

  <!-- ================= NODES ================= -->
  <!-- Push Endpoint -->
  <rect class="node" x="120" y="120" width="200" height="66" rx="6" stroke="#c58af0"/>
  <text class="ntxt" x="220" y="160" fill="#e6cffb">Push Endpoint</text>

  <!-- Transaction & Versioning (hexagon) -->
  <polygon class="node" points="360,200 640,200 672,235 640,270 360,270 328,235" fill="#3a2f47" stroke="#c58af0"/>
  <text class="ntxt" x="500" y="242" fill="#e6cffb">Transaction &amp; Versioning</text>

  <!-- Pull Endpoint -->
  <rect class="node" x="380" y="330" width="240" height="66" rx="6" stroke="#c58af0"/>
  <text class="ntxt" x="500" y="370" fill="#e6cffb">Pull Endpoint</text>

  <!-- External Sources -->
  <rect class="node" x="1000" y="118" width="230" height="66" rx="6" fill="#22402c" stroke="#4caf50"/>
  <text class="ntxt" x="1115" y="158" fill="#a5e3ad">External Sources</text>

  <!-- Primary Database (cylinder) -->
  <path class="node" fill="#3a2f1a" stroke="#e0a94b" d="M1035,285 a85,20 0 0 0 170,0 v100 a85,20 0 0 1 -170,0 z"/>
  <ellipse cx="1120" cy="285" rx="85" ry="20" fill="#3a2f1a" stroke="#e0a94b" stroke-width="2"/>
  <text class="ntxt" x="1120" y="352" fill="#f0cd85">Primary DB</text>

  <!-- User Interface -->
  <rect class="node" x="100" y="586" width="200" height="66" rx="33" stroke="#6f9fd8"/>
  <text class="ntxt" x="200" y="626" fill="#bfd6f2">User Interface</text>

  <!-- Replicache Client (parallelogram) -->
  <polygon class="node" points="460,634 720,634 690,712 430,712" fill="#1f3247" stroke="#6f9fd8"/>
  <text class="ntxt" x="575" y="679" fill="#bfd6f2">Replicache Client</text>

  <!-- Firestore onSnapshot -->
  <rect class="node" x="980" y="560" width="240" height="90" rx="33" stroke="#6f9fd8"/>
  <text class="ntxt" x="1100" y="598" fill="#bfd6f2">Firestore</text>
  <text class="ntxt" x="1100" y="624" fill="#bfd6f2">onSnapshot</text>
</svg>
